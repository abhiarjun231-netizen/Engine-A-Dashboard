name: Test Angel One Connection

on:
  workflow_dispatch:        # manual trigger (always available)
  schedule:
    # Sunday 9:00 AM IST = Sunday 03:30 UTC (Engine A weekly run)
    - cron: '30 3 * * 0'
    # Mon-Fri every 30 min during market hours (9:15 AM to 3:45 PM IST)
    # 9:15 IST = 03:45 UTC, 3:45 PM IST = 10:15 UTC
    - cron: '45 3-9 * * 1-5'    # at minute :45 from 03:45 to 09:45 UTC = 9:15 IST to 3:15 IST
    - cron: '15 4-10 * * 1-5'   # at minute :15 from 04:15 to 10:15 UTC = 9:45 IST to 3:45 IST

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install smartapi-python pyotp logzero websocket-client pandas yfinance
      - name: Fetch live + historical data
        env:
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_SECRET_KEY: ${{ secrets.ANGEL_SECRET_KEY }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          ANGEL_MPIN: ${{ secrets.ANGEL_MPIN }}
        run: python test_angel.py
      - name: Calculate Engine A score
        run: python calculate_engine_a_score.py
      - name: Commit data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update live data + score"
          git push
