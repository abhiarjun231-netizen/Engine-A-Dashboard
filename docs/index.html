<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Abhishek's Engine</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f9fb; --card:#fff; --card-alt:#f1f4f9; --border:#e8ecf1;
  --accent:#2563eb; --accent-light:#eff4ff; --accent-border:#bfdbfe;
  --green:#059669; --green-light:#ecfdf5; --green-border:#a7f3d0;
  --red:#dc2626; --red-light:#fef2f2; --red-border:#fecaca;
  --amber:#d97706; --amber-light:#fffbeb; --amber-border:#fde68a;
  --purple:#7c3aed; --purple-light:#f5f3ff;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 12px rgba(15,23,42,.08),0 1px 3px rgba(15,23,42,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* Header */
.header{padding:16px 20px 14px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:19px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.header .sub{font-size:10px;color:var(--text3);letter-spacing:2px;font-weight:600;margin-top:1px}
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;background:var(--green-light);border:1.5px solid var(--green-border)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(5,150,105,.6);animation:pulse 2s infinite}
.live-text{font-size:10px;color:var(--green);font-weight:800;letter-spacing:1px}
.update-time{font-size:9px;color:var(--text3);margin-top:3px;text-align:right}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Content */
.content{padding:16px 16px 88px}

/* Cards */
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-bottom:12px;box-shadow:var(--shadow-md)}
.card-alt{background:var(--card-alt);border-radius:10px;padding:10px}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);padding:6px 6px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:200;box-shadow:0 -2px 12px rgba(15,23,42,.06)}
.nav-btn{background:transparent;border:1.5px solid transparent;border-radius:12px;padding:6px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .25s ease;-webkit-tap-highlight-color:transparent}
.nav-btn.active{background:var(--accent-light);border-color:var(--accent-border)}
.nav-btn .icon{font-size:16px;opacity:.4;transition:opacity .25s}
.nav-btn.active .icon{opacity:1}
.nav-btn .label{font-size:8px;font-weight:800;letter-spacing:.5px;color:var(--text3)}
.nav-btn.active .label{color:var(--accent)}

/* Gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0}
.status-row{display:flex;align-items:center;gap:10px;margin-top:-2px}
.status-pill{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1.5px}
.score-diff{font-size:14px;font-weight:800;padding:2px 8px;border-radius:8px}

/* Summary Row */
.summary-row{display:flex;justify-content:space-around;padding:12px;border-radius:14px;background:var(--card);border:1px solid var(--border);margin-bottom:14px;box-shadow:var(--shadow)}
.summary-item{text-align:center}
.summary-val{font-size:22px;font-weight:800}
.summary-label{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-top:2px}

/* Stock Card */
.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ticker{font-size:18px;font-weight:800;letter-spacing:-.3px}
.badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.8px;display:inline-block}
.price{font-size:22px;font-weight:800;margin-top:4px}
.change{font-size:13px;font-weight:700;padding:1px 6px;border-radius:6px;display:inline-block}
.verdict-pill{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:800}

/* Progress bar */
.bar-wrap{margin-bottom:4px}
.bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-label .name{color:var(--text2);font-weight:500}
.bar-label .val{font-weight:700}
.bar-track{width:100%;height:5px;border-radius:5px;background:var(--card-alt)}
.bar-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:10px;padding:10px;border-radius:10px;background:var(--card-alt)}
.stat-item{text-align:center;padding:2px 0}
.stat-key{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px;margin-bottom:2px}
.stat-val{font-size:13px;font-weight:700}

/* Signal box */
.signal{margin-top:10px;padding:8px 10px;border-radius:8px;border-left:3px solid;background:var(--card-alt);font-size:11px;color:var(--text2);line-height:1.5}

/* DVM bars */
.dvm-row{display:flex;gap:12px}
.dvm-col{flex:1}
.dvm-header{display:flex;justify-content:space-between;margin-bottom:3px}
.dvm-label{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px}
.dvm-val{font-size:11px;font-weight:800}

/* 52W bar */
.w52-header{display:flex;justify-content:space-between;margin-bottom:3px}
.w52-track{position:relative;height:5px;border-radius:5px;background:var(--card-alt)}
.w52-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--red),var(--amber),var(--green));opacity:.7}
.w52-dot{position:absolute;top:-4px;width:13px;height:13px;border-radius:50%;background:#fff;border-width:2.5px;border-style:solid;box-shadow:var(--shadow)}

/* Velocity row */
.vel-row{display:flex;justify-content:space-between;margin:10px 0;padding:6px 10px;border-radius:8px;background:var(--card-alt);font-size:11px;color:var(--text2)}

/* PE Expansion */
.pe-box{padding:10px 12px;border-radius:10px;background:var(--accent-light);margin-bottom:10px;border:1px solid var(--accent-border)}
.pe-title{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:8px}
.pe-row{display:flex;align-items:center;justify-content:space-between}
.pe-now{text-align:center}
.pe-now .num{font-size:16px;font-weight:800;color:var(--accent)}
.pe-now .lbl{font-size:9px;color:var(--text3);font-weight:600}
.pe-arrow{flex:1;margin:0 10px;height:2px;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px}
.pe-target{text-align:center;margin-left:8px}
.pe-target .num{font-size:14px;font-weight:800;color:var(--green)}
.pe-target .lbl{font-size:8px;color:var(--text3);font-weight:600}

/* Trap / Kill checks */
.checks{display:flex;gap:12px;margin-bottom:10px;font-size:11px;font-weight:700}

/* Compounder extras */
.ets-peg-row{display:flex;gap:8px;margin-bottom:10px}
.ets-box,.peg-box{flex:1;padding:8px 10px;border-radius:10px;background:var(--card-alt)}
.ets-box .lbl,.peg-box .lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.5px}
.ets-box .val,.peg-box .val{font-size:14px;font-weight:800;margin-top:2px}
.stars{font-size:16px;color:var(--amber);letter-spacing:3px}

/* Donut area */
.donut-wrap{display:flex;align-items:center;gap:20px;justify-content:center;margin-top:16px}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-name{font-size:12px;color:var(--text2)}
.legend-pct{font-size:12px;font-weight:800}

/* Capital card */
.capital-card{margin-top:16px}
.capital-header{display:flex;justify-content:space-between;margin-bottom:12px}
.capital-label{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px}
.capital-total{font-size:15px;font-weight:800}

/* Fortress */
.fort-row{display:flex;justify-content:space-between;margin-bottom:14px}
.fort-item .lbl{font-size:10px;color:var(--text3);font-weight:600}
.fort-item .val{font-size:17px;font-weight:800;margin-top:2px}
.fort-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fort-cell{text-align:center;padding:10px;border-radius:10px;background:var(--card-alt)}
.fort-cell .k{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.5px}
.fort-cell .v{font-size:17px;font-weight:800;margin-top:2px}

/* Command */
.cmd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.cmd-cell{text-align:center;padding:14px 8px;border-radius:14px;border-width:1.5px;border-style:solid}
.cmd-cell .num{font-size:26px;font-weight:800}
.cmd-cell .lbl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-top:2px}
.power-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:12px;background:var(--card-alt);margin-bottom:6px;border-left:4px solid}
.power-ticker{font-size:15px;font-weight:800}
.power-price{font-size:12px;color:var(--text3);margin-left:8px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3);font-weight:600}

/* Refresh indicator */
.refresh-bar{height:2px;background:var(--accent);position:fixed;top:0;left:0;z-index:300;transition:width .3s;border-radius:0 2px 2px 0}

/* Hidden */
.hidden{display:none}

/* ── NEW: Modal ── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 30px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.15);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;padding:4px 8px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.5px;margin-bottom:4px;display:block}
.form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;background:var(--card-alt);color:var(--text);outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-link{font-size:11px;color:var(--accent);text-decoration:none;margin-top:2px;display:inline-block;font-weight:600}
.form-hint{font-size:10px;color:var(--text3);margin-top:1px}
.btn{padding:12px 20px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;width:100%;transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:11px;width:auto;border-radius:8px}
.fab{position:fixed;bottom:80px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;font-weight:300;border:none;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:150;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent;line-height:50px;text-align:center}
.fab:active{transform:scale(.9)}
.toast-container{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:600;width:90%;max-width:400px}
.toast{padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:6px;opacity:0;transition:opacity .3s;text-align:center;font-family:'Outfit',sans-serif}
.toast.show{opacity:1}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
.toast.info{background:var(--accent);color:#fff}
.pos-card{padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:8px;box-shadow:var(--shadow)}
.pos-head{display:flex;justify-content:space-between;align-items:center}
.pos-ticker{font-size:15px;font-weight:800}
.pos-qty{font-size:11px;color:var(--text3);margin-left:6px;font-weight:600}
.pos-pnl .amt{font-size:15px;font-weight:800}
.pos-pnl .pct{font-size:11px;font-weight:700}
.pos-detail{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text3);font-weight:500}
.pos-sell{margin-top:8px;text-align:right}
.coll-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;background:var(--card-alt);cursor:pointer;-webkit-tap-highlight-color:transparent}
.coll-head .coll-label{font-size:12px;font-weight:700;color:var(--text2)}
.coll-head .coll-arrow{font-size:10px;color:var(--text3);transition:transform .3s}
.coll-body{display:none;padding:12px 4px 4px}
.coll-body.open{display:block}

</style>
</head>
<body>
<div class="app" id="app">
  <!-- Refresh bar -->
  <div class="refresh-bar" id="refreshBar" style="width:0%"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div>
        <h1>ABHISHEK'S ENGINE</h1>
        <div class="sub">5-ENGINE INVESTMENT SYSTEM</div>
      </div>
      <div style="text-align:right">
        <div class="live-badge"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
        <div class="update-time" id="updateTime">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="loading" id="loader">
      <div class="spinner"></div>
      <div class="loading-text">Loading dashboard...</div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="nav">
    <button class="nav-btn active" data-tab="director" onclick="switchTab('director')"><span class="icon">◎</span><span class="label">Director</span></button>
    <button class="nav-btn" data-tab="momentum" onclick="switchTab('momentum')"><span class="icon">⚡</span><span class="label">Momentum</span></button>
    <button class="nav-btn" data-tab="value" onclick="switchTab('value')"><span class="icon">◆</span><span class="label">Value</span></button>
    <button class="nav-btn" data-tab="compounder" onclick="switchTab('compounder')"><span class="icon">★</span><span class="label">Compound</span></button>
    <button class="nav-btn" data-tab="fortress" onclick="switchTab('fortress')"><span class="icon">🛡</span><span class="label">Fortress</span></button>
    <button class="nav-btn" data-tab="command" onclick="switchTab('command')"><span class="icon">⌘</span><span class="label">Command</span></button>
  </div>
  <button class="fab" id="fab" onclick="showAddPosition()">+</button>
</div>
<div class="toast-container" id="toasts"></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"></div>

<script>
// ── State ──
let D = null;
let currentTab = 'director';
const DATA_URL = 'data.json';
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes

// ── GitHub API Config ──
const GH_OWNER='abhiarjun231-netizen',GH_REPO='Engine-A-Dashboard';
const GH_API='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents';
function getPAT(){let p=localStorage.getItem('gh_pat');if(!p){p=prompt('Enter GitHub PAT for paper trading.\nSaved permanently on this device.');if(p&&p.trim()){localStorage.setItem('gh_pat',p.trim());return p.trim();}return null;}return p;}
function showToast(msg,type){const c=$('toasts'),t=document.createElement('div');t.className='toast '+(type||'info');t.textContent=msg;c.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);}
function showModal(h){const o=$('modalOverlay');o.innerHTML='<div class="modal">'+h+'</div>';o.classList.add('active');}
function closeModal(){$('modalOverlay').classList.remove('active');}
function toggleColl(id){const b=$(id),a=$(id+'Arrow');if(b){b.classList.toggle('open');if(a)a.textContent=b.classList.contains('open')?'\u25BC':'\u25B6';}}
function b64enc(s){return btoa(unescape(encodeURIComponent(s)));}
function b64dec(s){return decodeURIComponent(escape(atob(s)));}
async function ghRead(path){const pat=getPAT();if(!pat)return null;try{const r=await fetch(GH_API+'/'+path,{headers:{'Authorization':'token '+pat,'Accept':'application/vnd.github.v3+json'}});if(!r.ok){if(r.status===401){localStorage.removeItem('gh_pat');showToast('Invalid PAT. Try again.','error');}else showToast('GitHub error: '+r.status,'error');return null;}const d=await r.json();return{content:JSON.parse(b64dec(d.content)),sha:d.sha};}catch(e){showToast('Failed to read from GitHub','error');return null;}}
async function ghWrite(path,content,sha,message){const pat=getPAT();if(!pat)return false;try{const body={message:message,content:b64enc(JSON.stringify(content,null,2))};if(sha)body.sha=sha;const r=await fetch(GH_API+'/'+path,{method:'PUT',headers:{'Authorization':'token '+pat,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){showToast('Write failed: '+r.status,'error');return false;}return true;}catch(e){showToast('Write failed','error');return false;}}
async function doSaveCapital(){const v=parseInt(($('capInput')||{}).value);if(!v||v<=0){showToast('Enter valid amount','error');return;}showToast('Saving...','info');const d=await ghRead('data/engine_b_stocks.json');if(!d)return;d.content.capital=v;d.content._capital=v;if(await ghWrite('data/engine_b_stocks.json',d.content,d.sha,'Update capital to '+v))showToast('Capital saved! Updates in ~2 min','success');}
async function doSaveInputs(){const inputs={nifty_pe:parseFloat(($('mi_nifty_pe')||{}).value||0),fii:parseFloat(($('mi_fii')||{}).value||0),dii:parseFloat(($('mi_dii')||{}).value||0),breadth:parseFloat(($('mi_breadth')||{}).value||0),yield_inverted:($('mi_yield')||{}).value||'No',rbi_stance:($('mi_rbi')||{}).value||'Neutral',cpi:parseFloat(($('mi_cpi')||{}).value||0),pmi:parseFloat(($('mi_pmi')||{}).value||0)};showToast('Saving inputs...','info');const d=await ghRead('data/manual_inputs.json');if(!d){if(await ghWrite('data/manual_inputs.json',inputs,null,'Create manual inputs'))showToast('Inputs saved! Score updates in ~2 min','success');return;}Object.assign(d.content,inputs);if(await ghWrite('data/manual_inputs.json',d.content,d.sha,'Update manual inputs'))showToast('Inputs saved! Score updates in ~2 min','success');}
function showAddPosition(){const eng=currentTab==='momentum'?'B':currentTab==='value'?'C':currentTab==='compounder'?'D':'B';const el=currentTab==='momentum'?'Momentum (B)':currentTab==='value'?'Value (C)':currentTab==='compounder'?'Compounder (D)':'Momentum (B)';showModal('<div class="modal-title"><span>Add Position</span><button class="modal-close" onclick="closeModal()">\u2715</button></div><div class="form-group"><label class="form-label">Engine</label><div style="padding:10px 12px;border-radius:10px;background:var(--accent-light);color:var(--accent);font-weight:700;font-size:13px">'+el+'</div></div><div class="form-group"><label class="form-label">Ticker (NSE Code)</label><input type="text" class="form-input" id="addTicker" placeholder="e.g. RELIANCE" style="text-transform:uppercase"></div><div style="display:flex;gap:8px"><div class="form-group" style="flex:1"><label class="form-label">Quantity</label><input type="number" class="form-input" id="addQty" placeholder="10" min="1"></div><div class="form-group" style="flex:1"><label class="form-label">Buy Price (\u20B9)</label><input type="number" class="form-input" id="addPrice" placeholder="2500" step="0.05"></div></div><button class="btn btn-primary" onclick="doAddPosition(\''+eng+'\')">Add Position</button>');}
async function doAddPosition(eng){const ticker=(($('addTicker')||{}).value||'').toUpperCase().trim();const qty=parseInt(($('addQty')||{}).value);const price=parseFloat(($('addPrice')||{}).value);if(!ticker){showToast('Enter ticker','error');return;}if(!qty||qty<=0){showToast('Enter valid quantity','error');return;}if(!price||price<=0){showToast('Enter valid price','error');return;}showToast('Adding '+ticker+'...','info');const d=await ghRead('data/engine_b_stocks.json');if(!d)return;const key=eng==='B'?'momentum':eng==='C'?'value':'compounders';if(!d.content[key])d.content[key]=[];if(d.content[key].some(p=>p.ticker===ticker)){showToast(ticker+' already exists','error');return;}d.content[key].push({ticker:ticker,qty:qty,buy_price:price,entry:price,buy_date:new Date().toISOString().split('T')[0],engine:eng});if(await ghWrite('data/engine_b_stocks.json',d.content,d.sha,'Add '+ticker+' to Engine '+eng)){showToast(ticker+' added! Updates in ~2 min','success');closeModal();}}
async function doSell(eng,ticker){if(!confirm('Sell '+ticker+'? Removes from paper portfolio.'))return;showToast('Selling '+ticker+'...','info');const d=await ghRead('data/engine_b_stocks.json');if(!d)return;const key=eng;if(!d.content[key])return;d.content[key]=d.content[key].filter(p=>p.ticker!==ticker);if(await ghWrite('data/engine_b_stocks.json',d.content,d.sha,'Sell '+ticker))showToast(ticker+' sold! Updates in ~2 min','success');}

function bar(val, max, color, height=5) {
  const pct = Math.min((val/max)*100,100);
  return `<div class="bar-track" style="height:${height}px"><div class="bar-fill" style="width:${pct}%;background:${color};height:100%"></div></div>`;
}

function labelBar(label, val, max, color) {
  return `<div class="bar-wrap"><div class="bar-label"><span class="name">${label}</span><span class="val" style="color:${color}">${val}/${max}</span></div>${bar(val,max,color)}</div>`;
}

function w52(pos) {
  const c = pos>70?'var(--green)':pos>40?'var(--amber)':'var(--red)';
  return `<div><div class="w52-header"><span style="font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px">52W RANGE</span><span style="font-size:11px;color:${c};font-weight:700">${pos}%</span></div><div class="w52-track"><div class="w52-fill" style="width:${pos}%"></div><div class="w52-dot" style="left:calc(${pos}% - 6px);border-color:${c}"></div></div></div>`;
}

function dvmBars(d, m) {
  const dc = d>55?'var(--green)':d>=45?'var(--amber)':'var(--red)';
  const mc = m>59?'var(--green)':m>=49?'var(--amber)':'var(--red)';
  return `<div class="dvm-row"><div class="dvm-col"><div class="dvm-header"><span class="dvm-label">DURABILITY</span><span class="dvm-val" style="color:${dc}">${d}</span></div>${bar(d,100,dc)}</div><div class="dvm-col"><div class="dvm-header"><span class="dvm-label">MOMENTUM</span><span class="dvm-val" style="color:${mc}">${m}</span></div>${bar(m,100,mc)}</div></div>`;
}

function statGrid(items) {
  return `<div class="stat-grid">${items.map(i=>`<div class="stat-item"><div class="stat-key">${i.l}</div><div class="stat-val" style="color:${i.c||'var(--text)'}">${i.v}</div></div>`).join('')}</div>`;
}

function signal(text, color) {

}

function sparklineSVG(data, w=80, ht=24, color='#2563eb') {
  if(!data||data.length<2) return '';
  const mn=Math.min(...data),mx=Math.max(...data),r=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${ht-((v-mn)/r)*(ht-6)-3}`).join(' ');
  return `<svg width="${w}" height="${ht}" style="overflow:visible"><defs><linearGradient id="sf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${ht} ${pts} ${w},${ht}" fill="url(#sf)"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/></svg>`;
}

// ── Gauge SVG ──
function gaugeSVG(score, size=200) {
  const r=size/2-20, circ=Math.PI*r, pct=score/100;
  const c=score>62?'var(--green)':score>40?'var(--amber)':'var(--red)';
  return `<svg width="${size}" height="${size/2+36}" viewBox="0 0 ${size} ${size/2+36}"><defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#dc2626"/><stop offset="35%" stop-color="#d97706"/><stop offset="65%" stop-color="#84cc16"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs><path d="M 20 ${size/2+10} A ${r} ${r} 0 0 1 ${size-20} ${size/2+10}" fill="none" stroke="#e8ecf1" stroke-width="12" stroke-linecap="round"/><path d="M 20 ${size/2+10} A ${r} ${r} 0 0 1 ${size-20} ${size/2+10}" fill="none" stroke="url(#gg)" stroke-width="12" stroke-linecap="round" stroke-dasharray="${circ*pct} ${circ}"/><text x="${size/2}" y="${size/2-6}" text-anchor="middle" fill="#0f172a" style="font-size:48px;font-weight:800;font-family:Outfit">${score}</text><text x="${size/2}" y="${size/2+20}" text-anchor="middle" fill="#94a3b8" style="font-size:11px;font-weight:700;letter-spacing:3px">ENGINE A</text></svg>`;
}

// ── Donut SVG ──
function donutSVG(eq, debt, gold) {
  const r=42, circ=2*Math.PI*r;
  const segs=[{p:eq,c:'#2563eb'},{p:debt,c:'#7c3aed'},{p:gold,c:'#d97706'}];
  let off=0, circles='';
  segs.forEach(s=>{const d=(s.p/100)*circ;circles+=`<circle cx="60" cy="60" r="${r}" fill="none" stroke="${s.c}" stroke-width="14" stroke-dasharray="${d} ${circ-d}" stroke-dashoffset="${-off}" stroke-linecap="round" transform="rotate(-90 60 60)"/>`;off+=d;});
  return `<svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${r}" fill="none" stroke="#f0f2f5" stroke-width="14"/>${circles}<text x="60" y="56" text-anchor="middle" fill="#0f172a" style="font-size:20px;font-weight:800">${eq}%</text><text x="60" y="72" text-anchor="middle" fill="#94a3b8" style="font-size:9px;letter-spacing:1.5px;font-weight:600">EQUITY</text></svg>`;
}

  sectors.slice(0,5).forEach(function(s){
    var bc=s.overweight?'var(--red)':s.pct>=15?'var(--amber)':'var(--accent)';

  });

}

    html+='</div>';

// ── Tab Renderers ──
function renderDirector() {
  const a = D.engineA;
  const alloc = a.allocation;
  const sc = a.score, ps = a.prevScore||sc, diff = sc-ps;
  const status = sc>62?'AGGRESSIVE':sc>52?'BULLISH':sc>40?'NEUTRAL':sc>30?'CAUTIOUS':'DEFENSIVE';
  const c = sc>62?'green':sc>40?'amber':'red';

  let html = `<div class="gauge-wrap">${gaugeSVG(sc)}<div class="status-row"><span class="status-pill" style="background:var(--${c}-light);color:var(--${c});border:1.5px solid var(--${c}-border)">${status}</span>`;
  if(diff!==0) html+=`<span class="score-diff" style="color:var(--${diff>0?'green':'red'});background:var(--${diff>0?'green':'red'}-light)">${diff>0?'↑':'↓'}${Math.abs(diff)}</span>`;
  html+=`</div></div>`;

  // Safety Overrides
  const sf = D.safety||{};
  if(sf.red_flag || sf.pe_bubble) {
    html+=`<div style="display:flex;gap:8px;margin-bottom:12px">`;
    html+=`<div style="flex:1;text-align:center;padding:10px;border-radius:12px;background:${sf.red_flag?'var(--red-light)':'var(--green-light)'};border:1.5px solid ${sf.red_flag?'var(--red-border)':'var(--green-border)'}"><div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px">RED FLAG</div><div style="font-size:16px;font-weight:800;color:${sf.red_flag?'var(--red)':'var(--green)'}">${sf.red_flag?'YES':'NO'}</div></div>`;
    html+=`<div style="flex:1;text-align:center;padding:10px;border-radius:12px;background:${sf.pe_bubble?'var(--red-light)':'var(--green-light)'};border:1.5px solid ${sf.pe_bubble?'var(--red-border)':'var(--green-border)'}"><div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px">PE BUBBLE</div><div style="font-size:16px;font-weight:800;color:${sf.pe_bubble?'var(--red)':'var(--green)'}">${sf.pe_bubble?'YES':'NO'}</div></div>`;
    html+=`</div>`;
  } else {
    html+=`<div style="display:flex;gap:8px;margin-bottom:12px"><div style="flex:1;text-align:center;padding:10px;border-radius:12px;background:var(--green-light);border:1.5px solid var(--green-border)"><div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px">RED FLAG</div><div style="font-size:16px;font-weight:800;color:var(--green)">NO</div></div><div style="flex:1;text-align:center;padding:10px;border-radius:12px;background:var(--green-light);border:1.5px solid var(--green-border)"><div style="font-size:9px;color:var(--text3);font-weight:700;letter-spacing:1px">PE BUBBLE</div><div style="font-size:16px;font-weight:800;color:var(--green)">NO</div></div></div>`;
  }

  // Donut
  html+=`<div class="donut-wrap">${donutSVG(alloc.equity,alloc.debt,alloc.gold)}<div class="donut-legend">`;
  [{n:'Equity',p:alloc.equity,c:'#2563eb'},{n:'Debt',p:alloc.debt,c:'#7c3aed'},{n:'Gold',p:alloc.gold,c:'#d97706'}].forEach(x=>{
    html+=`<div class="legend-item"><div class="legend-dot" style="background:${x.c}"></div><span class="legend-name">${x.n}</span><span class="legend-pct">${x.p}%</span></div>`;
  });
  html+=`</div></div>`;

  // P&L Summary
  const pnl = D.pnl||{};
  if(pnl.total_invested>0) {
    const plColor = pnl.pnl>=0?'var(--green)':'var(--red)';
    const plBg = pnl.pnl>=0?'var(--green-light)':'var(--red-light)';
    html+=`<div class="card"><div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:12px">P&L TRACKING</div>`;
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">`;
    html+=`<div style="padding:10px;border-radius:10px;background:var(--card-alt);text-align:center"><div style="font-size:9px;color:var(--text3);font-weight:600">INVESTED</div><div style="font-size:16px;font-weight:800;color:var(--text)">₹${Math.round(pnl.total_invested).toLocaleString('en-IN')}</div></div>`;
    html+=`<div style="padding:10px;border-radius:10px;background:var(--card-alt);text-align:center"><div style="font-size:9px;color:var(--text3);font-weight:600">CURRENT VALUE</div><div style="font-size:16px;font-weight:800;color:var(--text)">₹${Math.round(pnl.current_value).toLocaleString('en-IN')}</div></div>`;
    html+=`</div>`;
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    html+=`<div style="padding:10px;border-radius:10px;background:${plBg};text-align:center"><div style="font-size:9px;color:var(--text3);font-weight:600">P&L</div><div style="font-size:16px;font-weight:800;color:${plColor}">${pnl.pnl>=0?'+':''}₹${Math.round(Math.abs(pnl.pnl)).toLocaleString('en-IN')} (${pnl.pnl>=0?'+':''}${pnl.pnl_pct}%)</div></div>`;
    html+=`<div style="padding:10px;border-radius:10px;background:var(--accent-light);text-align:center"><div style="font-size:9px;color:var(--text3);font-weight:600">CASH AVAILABLE</div><div style="font-size:16px;font-weight:800;color:var(--accent)">₹${Math.round(pnl.cash_available).toLocaleString('en-IN')}</div></div>`;
    html+=`</div>`;
    // Per-engine deployed
    html+=`<div style="margin-top:10px">`;
    [{l:'Engine B',d:pnl.b_deployed,b:pnl.b_budget,c:'var(--accent)'},{l:'Engine C',d:pnl.c_deployed,b:pnl.c_budget,c:'var(--purple)'},{l:'Engine D',d:pnl.d_deployed,b:pnl.d_budget,c:'var(--green)'}].forEach(e=>{
      if(e.b>0){const avail=Math.round(e.b-e.d);html+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--text2)">${e.l} — Deployed</span><span style="font-size:12px;font-weight:700;color:${e.c}">${fmtINR(e.d)} / ${fmtINR(e.b)}</span></div><div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--text2)">${e.l} — Available</span><span style="font-size:12px;font-weight:700;color:var(--green)">${fmtINR(avail)}</span></div>`;}
    });
    html+=`</div></div>`;
  }

  // Capital Deployment
  const cap = a.capital||500000;

  html+=`<button class="btn btn-primary" onclick="doSaveInputs()">Save & Rescore</button></div></div>`;


  return html;
}

    if(s.multi) html+=`<span class="badge" style="background:${s.multi==='ALL 3'?'var(--green-light)':'var(--accent-light)'};color:${s.multi==='ALL 3'?'var(--green)':'var(--accent)'};border:1px solid ${s.multi==='ALL 3'?'var(--green-border)':'var(--accent-border)'}">${s.multi}</span>`;
    html+=`</div><div style="display:flex;align-items:baseline;gap:8px;margin-top:4px"><span class="price">₹${(s.price||0).toLocaleString()}</span><span class="change" style="color:${pc};background:${pcBg}">${s.change>=0?'+':''}${s.change||0}%</span></div><span class="stars">${starsStr}</span></div>`;

    html+=`<div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="verdict-pill" style="background:${vs.bg};color:${vs.text};border:1.5px solid ${vs.border}">${s.verdict}</div><span style="font-size:11px;color:var(--text3)">DNA: <span style="font-weight:800;color:${(s.dna||0)>=16?'var(--green)':'var(--amber)'}">${s.dna||0}/20</span></span><span class="badge" style="background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-border);letter-spacing:1px">${s.stage||'IDENTIFY'}</span></div></div>`;

    html+=`<div class="ets-peg-row"><div class="ets-box"><div class="lbl">EARNINGS TRAJECTORY</div><div class="val" style="color:${etsColors[ets]}">${etsLabels[ets]} (${ets}/4)</div></div><div class="peg-box"><div class="lbl">PEG RATIO</div><div class="val" style="color:${pegC}">${peg} ${pegLabel}</div></div></div>`;

    html+=`<div class="checks"><span style="color:${ks.growth?'var(--green)':'var(--red)'}">${ks.growth?'✓':'✗'} Growth</span><span style="color:${ks.debt?'var(--green)':'var(--red)'}">${ks.debt?'✓':'✗'} Debt</span></div>`;
    html+=w52(s.w52_pos||50);
    html+=statGrid([
      {l:'ROE',v:`${s.roe||0}%`,c:'var(--green)'},
      {l:'PE',v:s.pe||0},
      {l:'PIO',v:`${s.pio||0}/9`,c:'var(--green)'},
      {l:'D/E',v:s.de||0,c:(s.de||0)<1?'var(--green)':'var(--red)'},
      {l:'PG',v:`${s.pg||0}%`,c:'var(--green)'},
      {l:'PROM',v:`${s.prom||0}%`,c:(s.prom||0)>50?'var(--green)':''},
      {l:'VOL',v:`${s.vol_ratio||0}x`,c:(s.vol_ratio||0)>=2?'var(--red)':''},
      {l:'DEL',v:`${s.delivery||0}%`,c:(s.delivery||0)>=60?'var(--green)':''},
    ]);
    html+=signal(s.signal||'—',vs.text);
    html+=`</div>`;
  });
  return html;
}

function renderFortress() {
  const f=D.fortress||{};
  let html=`<div class="card"><div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1.5px;margin-bottom:14px">DEBT DURATION</div><div class="fort-row">`;
  [{l:'RBI Stance',v:f.rbi||'—',c:'var(--amber)'},{l:'Duration',v:f.duration||'—',c:'var(--accent)'},{l:'Allocation',v:formatINR(f.debt_alloc||0),c:'var(--text)'}].forEach(x=>{
    html+=`<div class="fort-item"><div class="lbl">${x.l}</div><div class="val" style="color:${x.c}">${x.v}</div></div>`;
  });
  html+=`</div>`;
  const bb=f.bharatbond||{};
  html+=`<div class="card-alt"><div style="font-size:12px;color:var(--text2);font-weight:600">${bb.name||'BHARATBOND'}</div><div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:15px;font-weight:800">NAV ₹${bb.nav||0}</span><span style="font-size:15px;font-weight:800;color:var(--green)">YTM ${bb.ytm||0}%</span></div></div></div>`;

  html+=`<div class="card"><div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1.5px;margin-bottom:14px">GOLD SIGNALS</div><div class="fort-row"><div class="fort-item"><div class="lbl">Signal</div><div class="val" style="color:var(--amber)">${f.gold_signal||'—'}</div></div><div class="fort-item" style="text-align:right"><div class="lbl">Allocation</div><div class="val">${formatINR(f.gold_alloc||0)}</div></div></div>`;
  html+=`<div class="fort-grid">`;
  [{k:'GVIX',v:f.gvix||0,c:(f.gvix||0)>25?'var(--red)':'var(--green)'},{k:'CRUDE',v:`$${f.crude||0}`,c:(f.crude||0)>100?'var(--red)':'var(--green)'},{k:'INR/USD',v:f.inr||0,c:'var(--text)'}].forEach(x=>{
    html+=`<div class="fort-cell"><div class="k">${x.k}</div><div class="v" style="color:${x.c}">${x.v}</div></div>`;
  });
  html+=`</div>`;
  const gb=f.goldbees||{};
  html+=`<div class="card-alt" style="margin-top:10px"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--text2);font-weight:600">${gb.name||'GOLDBEES'}</span><span style="font-size:15px;font-weight:800;color:var(--amber)">₹${gb.price||0}</span></div></div></div>`;
  return html;
}

function renderCommand() {
  const a=D.engineA||{}, cmd=D.command||{};
  let html=`<div class="cmd-grid">`;
  [{v:a.score||0,l:'ENGINE A',c:'var(--accent)',bg:'var(--accent-light)',b:'var(--accent-border)'},{v:cmd.totalPositions||0,l:'POSITIONS',c:'var(--green)',bg:'var(--green-light)',b:'var(--green-border)'},{v:`${(a.allocation||{}).equity||0}%`,l:'EQUITY',c:'var(--amber)',bg:'var(--amber-light)',b:'var(--amber-border)'}].forEach(x=>{
    html+=`<div class="cmd-cell" style="background:${x.bg};border-color:${x.b}"><div class="num" style="color:${x.c}">${x.v}</div><div class="lbl">${x.l}</div></div>`;
  });
  html+=`</div>`;

  // Power Picks
  const picks=cmd.powerPicks||[];
  const allStocks=[...(D.momentum||[]),...(D.value||[]),...(D.compounders||[])];
  html+=`<div class="card"><div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1.5px;margin-bottom:12px">POWER PICKS — ALL 3 ENGINES</div>`;
  if(picks.length===0) html+=`<div style="text-align:center;padding:20px;color:var(--text3)">No stocks in all 3 engines yet</div>`;
  picks.forEach(t=>{
    const stock=allStocks.find(s=>s.ticker===t);
    if(!stock) return;
    const vs=vStyles[stock.verdict]||vStyles['WAIT'];
    html+=`<div class="power-item" style="border-left-color:${vs.text}"><div><span class="power-ticker">${t}</span><span class="power-price">₹${(stock.price||0).toLocaleString()}</span></div><div class="verdict-pill" style="background:${vs.bg};color:${vs.text};border:1.5px solid ${vs.border};font-size:10px;padding:4px 10px">${stock.verdict}</div></div>`;
  });
  html+=`</div>`;

  // Engine Health
  html+=`<div class="card"><div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:1.5px;margin-bottom:12px">ENGINE HEALTH</div>`;
  const eh=cmd.engineHealth||{b:0,c:0,d:0,e:0};
  [{l:'Momentum (B)',v:eh.b,c:'var(--accent)'},{l:'Value (C)',v:eh.c,c:'var(--purple)'},{l:'Compounders (D)',v:eh.d,c:'var(--green)'},{l:'Fortress (E)',v:eh.e,c:'var(--amber)'}].forEach(e=>{
    html+=`<div style="margin-bottom:10px">${labelBar(e.l,e.v,100,e.c)}</div>`;
  });
  html+=`</div>`;
  return html;
}

// ── Tab Switching ──
function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===id);
  });
  var fab=$('fab');if(fab)fab.style.display=(id==='momentum'||id==='value'||id==='compounder')?'block':'none';
  renderTab();
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderTab() {
  if(!D) return;
  const content = $('content');
  const renderers = {
    director: renderDirector,
    momentum: renderMomentum,
    value: renderValue,
    compounder: renderCompounder,
    fortress: renderFortress,
    command: renderCommand,
  };
  content.innerHTML = (renderers[currentTab]||renderDirector)();
  $('updateTime').textContent = D.lastUpdate || 'No data';
}

// ── Data Fetching ──
async function fetchData() {
  const bar = $('refreshBar');
  bar.style.width = '30%';
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    bar.style.width = '70%';
    if(!res.ok) throw new Error('HTTP ' + res.status);
    D = await res.json();
    bar.style.width = '100%';
    renderTab();
    setTimeout(()=>{bar.style.width='0%'},500);
  } catch(e) {
    console.error('Fetch error:', e);
    bar.style.width = '0%';
    // If no data yet, show message
    if(!D) {
      $('content').innerHTML = `<div class="loading"><div style="font-size:40px">📊</div><div class="loading-text">Dashboard data not found</div><div style="font-size:12px;color:var(--text3);text-align:center;line-height:1.6;padding:0 20px">Upload your Trendlyne CSVs to the <code>data/</code> folder and wait for the next cron run, or run <code>python generate_dashboard_data.py</code> manually.</div></div>`;
    }
  }
}

// ── Init ──
fetchData();
setInterval(fetchData, REFRESH_MS);

// Register PWA service worker if available
if('serviceWorker' in navigator) {
  // Future: add sw.js for offline support
}
</script>
